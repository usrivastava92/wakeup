name: Release

# Builds standalone `wakeup` binaries for every platform wakeup-core actually
# supports and attaches them to a GitHub Release. This is what lets
# downstream consumers (e.g. the herdr-wakeup plugin) vendor a prebuilt
# binary instead of requiring every end user to have a Rust toolchain.
#
# Triggers on a `vX.Y.Z` tag push, or manually via workflow_dispatch against
# an existing tag (useful for re-running after a release workflow fix).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)build and attach assets to"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 runners are Apple Silicon (arm64) hosts, but Xcode's
          # toolchain ships both Darwin SDKs, so both Mac architectures are
          # built here without needing a second (Intel) runner.
          - os: macos-14
            target: aarch64-apple-darwin
            asset: wakeup-macos-arm64
            native: true
          - os: macos-14
            target: x86_64-apple-darwin
            asset: wakeup-macos-x86_64
            native: false
          # musl, not glibc: a glibc-linked binary built on whatever glibc
          # happens to ship in the runner's Ubuntu image will refuse to run
          # on any distro with an older glibc (confirmed the hard way: a
          # gnu-target build here failed with a GLIBC_2.39-not-found error
          # on plain debian:bookworm-slim). musl gives a fully static
          # binary with no runtime libc dependency at all, so it runs
          # unmodified on any Linux distro, glibc or musl-based.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: wakeup-linux-x86_64
            native: true
            musl: true
          # ubuntu-24.04-arm is a native arm64 GitHub-hosted runner, so this
          # is a native build too, not a cross-compile - no cross-linker
          # setup needed, same as the x86_64 job.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: wakeup-linux-arm64
            native: true
            musl: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: wakeup-windows-x86_64.exe
            native: true

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'invalid release tag: %s\n' "$tag" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          ref: refs/tags/${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out release tag
        shell: bash
        env:
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          expected_ref="refs/tags/${TAG}^{commit}"
          expected_commit="$(git rev-parse "$expected_ref")"
          head_commit="$(git rev-parse HEAD)"
          if [ "$head_commit" != "$expected_commit" ]; then
            printf 'checked out HEAD %s does not match %s (%s)\n' "$head_commit" "$expected_ref" "$expected_commit" >&2
            exit 1
          fi

      - name: Verify release versions
        shell: bash
        env:
          TAG: ${{ steps.release_tag.outputs.tag }}
          VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          version = os.environ["VERSION"]
          root = pathlib.Path(".")
          cargo_tomls = [
              root / "crates" / "wakeup" / "Cargo.toml",
              root / "crates" / "wakeup-core" / "Cargo.toml",
          ]
          for path in cargo_tomls:
              data = tomllib.loads(path.read_text())
              pkg_version = data["package"]["version"]
              if pkg_version != version:
                  print(f"{path}: package version {pkg_version} != {version}", file=sys.stderr)
                  sys.exit(1)

          lock = tomllib.loads((root / "Cargo.lock").read_text())
          found = set()
          for package in lock.get("package", []):
              if package.get("name") in {"wakeup", "wakeup-core"}:
                  if package.get("version") != version:
                      print(f"Cargo.lock: {package['name']} version {package.get('version')} != {version}", file=sys.stderr)
                      sys.exit(1)
                  found.add(package["name"])
          if found != {"wakeup", "wakeup-core"}:
              print(f"Cargo.lock: missing packages {sorted({'wakeup', 'wakeup-core'} - found)}", file=sys.stderr)
              sys.exit(1)
          PY

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.musl == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} -p wakeup

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/wakeup"
          if [ "${{ runner.os }}" = "Windows" ]; then
            src="${src}.exe"
          fi
          cp "$src" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true

      - name: Assert smoke output
        if: matrix.native == true
        shell: bash
        env:
          VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          output="$(./dist/${{ matrix.asset }} --version)"
          expected="wakeup ${VERSION}"
          if [ "$output" != "$expected" ]; then
            printf 'unexpected version output: %s (expected %s)\n' "$output" "$expected" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf 'invalid release tag: %s\n' "$tag" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          path: dist

      - name: Verify artifacts
        shell: bash
        run: |
          mkdir -p out
          expected=(
            wakeup-macos-arm64
            wakeup-macos-x86_64
            wakeup-linux-x86_64
            wakeup-linux-arm64
            wakeup-windows-x86_64.exe
          )
          for name in "${expected[@]}"; do
            file="dist/$name/$name"
            if [ ! -s "$file" ]; then
              printf 'missing or empty artifact: %s\n' "$file" >&2
              exit 1
            fi
            cp "$file" "out/$name"
          done
          if [ "$(find dist -mindepth 2 -maxdepth 2 -type f | wc -l | tr -d ' ')" -ne 5 ]; then
            printf 'unexpected artifact count\n' >&2
            exit 1
          fi

      - name: Check release exists
        id: release_exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          exists="$(gh api graphql -f query='query($owner:String!, $repo:String!, $tag:String!) { repository(owner: $owner, name: $repo) { release(tagName: $tag) { id } } }' -f owner="$OWNER" -f repo="$REPO" -f tag="$TAG" --jq '.data.repository.release != null')"
          case "$exists" in
            true|false)
              printf 'exists=%s\n' "$exists" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf 'unexpected GraphQL response: %s\n' "$exists" >&2
              exit 1
              ;;
          esac

      - name: Create release
        if: steps.release_exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: out/*
          generate_release_notes: true

      - name: Upload assets to existing release
        if: steps.release_exists.outputs.exists == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          gh release upload "$TAG" out/* --clobber
