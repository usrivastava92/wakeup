name: Update Homebrew Tap
# Fires automatically after a successful Release workflow run.
# Uses workflow_run so it runs in the default branch (main) context.
# The production environment gate and branch protection are separate controls.
# Contributors on PR branches cannot access the APP_PRIVATE_KEY secret.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: update-homebrew-tap
  cancel-in-progress: false

jobs:
  update:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Get release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release tag: $TAG"

      - name: Compute SHA256s from release assets
        id: hashes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ASSET_NAMES="wakeup-macos-arm64 wakeup-macos-x86_64 wakeup-linux-x86_64 wakeup-linux-arm64"
          for name in $ASSET_NAMES; do
            urls=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/${{ steps.release.outputs.tag }}" \
              --jq ".assets[] | select(.name == \"${name}\") | .browser_download_url")
            count=$(printf '%s\n' "$urls" | sed '/^$/d' | wc -l | tr -d ' ')
            if [ "$count" -ne 1 ]; then
              echo "Expected exactly one nonempty asset URL for ${name}." >&2
              exit 1
            fi
            url=$(printf '%s\n' "$urls" | sed '/^$/d')
            sha=$(curl -fsSL "$url" | sha256sum | awk '{print $1}')
            key=$(echo "$name" | sed 's/wakeup-//')
            echo "${key}=${sha}"
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Render formula
        run: |
          VER="${{ steps.release.outputs.tag }}"
          node scripts/render-homebrew-formula.mjs \
            --version "${VER#v}" \
            --sha256-macos-arm64 "${{ steps.hashes.outputs.macos-arm64 }}" \
            --sha256-macos-x86_64 "${{ steps.hashes.outputs.macos-x86_64 }}" \
            --sha256-linux-x86_64 "${{ steps.hashes.outputs.linux-x86_64 }}" \
            --sha256-linux-arm64 "${{ steps.hashes.outputs.linux-arm64 }}" \
            > wakeup.rb

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: usrivastava92
          repositories: homebrew-tap
          permission-contents: write

      - name: Checkout homebrew-tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: usrivastava92/homebrew-tap
          ref: main
          path: homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - name: Push to homebrew-tap
        env:
          VERSION: ${{ steps.release.outputs.tag }}
        run: |
          cp wakeup.rb homebrew-tap/Formula/wakeup.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Formula is already up to date."
            exit 0
          fi

          git add Formula/wakeup.rb
          git commit -m "Update wakeup to ${VERSION}"
          git push origin HEAD:main
