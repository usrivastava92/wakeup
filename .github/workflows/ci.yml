name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release --workspace

      # systemd-inhibit is present on ubuntu-latest's default systemd install,
      # but confirm it explicitly since the Linux backend shells out to it.
      - name: Check systemd-inhibit is available (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: command -v systemd-inhibit

      - name: Smoke test (non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          ./target/release/wakeup --version
          ./target/release/wakeup -t 1

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          ./target/release/wakeup.exe --version
          ./target/release/wakeup.exe -t 1
